name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: go build -o adp .

      - name: Run offline E2E tests
        run: bash tests/test.sh

      - name: Run full E2E tests (with API)
        if: env.ADP_API_KEY != ''
        env:
          ADP_API_KEY: ${{ secrets.ADP_API_KEY }}
          ADP_API_BASE_URL: ${{ secrets.ADP_API_BASE_URL }}
        run: bash tests/test.sh

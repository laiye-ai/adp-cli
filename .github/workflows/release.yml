name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Get version from tag
        id: version
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "VERSION_NO_V=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build all platforms
        run: make build-all VERSION=${{ steps.version.outputs.VERSION }}

      - name: List build artifacts
        run: ls -laR dist/

      - name: Package artifacts
        run: |
          cd dist
          for dir in win32-*; do
            zip "adp-${dir}.zip" -j "${dir}/adp.exe" && rm -rf "$dir"
          done
          for dir in linux-* darwin-*; do
            tar czf "adp-${dir}.tar.gz" -C "$dir" adp && rm -rf "$dir"
          done
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

      - name: Sync package.json version and publish to npm
        run: |
          npm version ${{ steps.version.outputs.VERSION_NO_V }} --no-git-tag-version
          if [[ "${{ steps.version.outputs.VERSION_NO_V }}" == *"-"* ]]; then
            npm publish --access public --tag beta
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Get version from tag
        id: version
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "VERSION_NO_V=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build all platforms
        run: make build-all VERSION=${{ steps.version.outputs.VERSION }}

      - name: List build artifacts
        run: ls -laR dist/

      - name: Package artifacts
        run: |
          cd dist
          for dir in win32-*; do
            zip "adp-${dir}.zip" -j "${dir}/adp.exe" && rm -rf "$dir"
          done
          for dir in linux-* darwin-*; do
            tar czf "adp-${dir}.tar.gz" -C "$dir" adp && rm -rf "$dir"
          done
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

      - name: Prepare npm platform packages
        run: |
          VERSION_NO_V=${{ steps.version.outputs.VERSION_NO_V }}

          # Copy binaries into platform package directories
          # Rebuild binaries from dist archives for npm packages
          cd dist

          # Extract and place binaries for each platform
          for archive in *.tar.gz; do
            # adp-linux-x64.tar.gz -> linux-x64
            platform_arch=$(echo "$archive" | sed 's/^adp-//;s/\.tar\.gz$//')
            pkg_dir="../npm/adp-cli-${platform_arch}"
            mkdir -p "${pkg_dir}/bin"
            tar -xzf "$archive" -C "${pkg_dir}/bin/"
          done

          for archive in *.zip; do
            # adp-win32-x64.zip -> win32-x64
            platform_arch=$(echo "$archive" | sed 's/^adp-//;s/\.zip$//')
            pkg_dir="../npm/adp-cli-${platform_arch}"
            mkdir -p "${pkg_dir}/bin"
            unzip -o "$archive" -d "${pkg_dir}/bin/"
          done

          cd ..

          # Update version in all platform packages
          for pkg_dir in npm/adp-cli-*; do
            cd "$pkg_dir"
            npm version "$VERSION_NO_V" --no-git-tag-version
            cd ../..
          done

      - name: Publish platform packages to npm
        run: |
          VERSION_NO_V=${{ steps.version.outputs.VERSION_NO_V }}
          TAG_FLAG=""
          if [[ "$VERSION_NO_V" == *"-"* ]]; then
            TAG_FLAG="--tag beta"
          fi

          for pkg_dir in npm/adp-cli-*; do
            echo "Publishing ${pkg_dir}..."
            cd "$pkg_dir"
            npm publish --access public $TAG_FLAG
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package to npm
        run: |
          VERSION_NO_V=${{ steps.version.outputs.VERSION_NO_V }}

          # Update optionalDependencies versions to match
          sed -i "s/\"1.0.0\"/\"${VERSION_NO_V}\"/g" package.json

          # Set package version
          npm version "$VERSION_NO_V" --no-git-tag-version

          if [[ "$VERSION_NO_V" == *"-"* ]]; then
            npm publish --access public --tag beta
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

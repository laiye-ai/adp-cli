name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # Required for npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Get version from tag
        id: version
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "VERSION_NO_V=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build all platforms
        run: make build-all VERSION=${{ steps.version.outputs.VERSION }}

      - name: List build artifacts
        run: ls -la dist/

      - name: Package artifacts
        run: |
          cd dist
          for f in adp-win32-*.exe; do
            zip "${f%.exe}.zip" "$f" && rm "$f"
          done
          for f in adp-linux-* adp-darwin-*; do
            [[ "$f" == *.tar.gz ]] && continue
            tar czf "${f}.tar.gz" "$f" && rm "$f"
          done
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

      - name: Sync package.json version and publish to npm
        run: |
          npm version ${{ steps.version.outputs.VERSION_NO_V }} --no-git-tag-version
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
